name: Build Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact_name: imcc-windows
            asset_path: target/x86_64-pc-windows-msvc/release/imcc.exe
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            artifact_name: imcc-linux
            asset_path: target/x86_64-unknown-linux-gnu/release/imcc
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            artifact_name: imcc-mac
            asset_path: target/x86_64-apple-darwin/release/imcc
            os: macos-latest
          - target: aarch64-unknown-linux-musl
            artifact_name: imcc-android-termux
            asset_path: target/aarch64-unknown-linux-musl/release/imcc
            os: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Cross-Compiler
      if: matrix.target == 'aarch64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

    - name: Configure Linker
      if: matrix.target == 'aarch64-unknown-linux-musl'
      run: |
        mkdir -p .cargo
        echo '[target.aarch64-unknown-linux-musl]' > .cargo/config.toml
        echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.asset_path }}
